services:
  mysql:
    image: mysql:8.0
    container_name: sales_control_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sales_control_db
      MYSQL_USER: sales_user
      MYSQL_PASSWORD: sales_password
    ports:
      - "3310:3306"
    volumes:
      - sales_control_mysql_data:/var/lib/mysql

volumes:
  sales_control_mysql_data: